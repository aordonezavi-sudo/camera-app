<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Cabina Fotográfica Perú</title>
  <style>
    :root{
      --rojo:#d71920;
      --rojo-oscuro:#9f1017;
      --blanco:#ffffff;
      --gris:#f5f5f5;
      --negro:#181818;
      --dorado:#ffd166;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(160deg,var(--rojo),var(--rojo-oscuro));
      color:var(--blanco);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:16px;
    }
    .app{
      width:min(960px,100%);
      min-height:calc(100vh - 32px);
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.22);
      border-radius:28px;
      padding:18px;
      box-shadow:0 20px 60px rgba(0,0,0,.25);
      backdrop-filter:blur(10px);
    }
    header{text-align:center;margin-bottom:12px}
    h1{font-size:clamp(28px,7vw,52px);margin:8px 0 4px;font-weight:900}
    p{margin:0;opacity:.95}
    .camera-wrap{
      background:#111;
      border-radius:24px;
      overflow:hidden;
      position:relative;
      aspect-ratio:3/4;
      max-height:65vh;
      margin:16px auto;
      border:4px solid rgba(255,255,255,.9);
    }
    video, canvas, img.preview{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    canvas{display:none}
    .badge{
      position:absolute;
      top:12px;
      left:12px;
      background:rgba(0,0,0,.48);
      padding:8px 12px;
      border-radius:999px;
      font-weight:700;
      font-size:14px;
    }
    .controls,.destinations{
      display:grid;
      gap:12px;
      margin-top:12px;
    }
    .controls{
      grid-template-columns:1fr 1fr;
    }
    .destinations{
      grid-template-columns:1fr;
      display:none;
    }
    button{
      border:0;
      border-radius:18px;
      padding:16px 14px;
      font-size:18px;
      font-weight:900;
      cursor:pointer;
      background:var(--blanco);
      color:var(--rojo-oscuro);
      box-shadow:0 10px 24px rgba(0,0,0,.18);
    }
    button:active{transform:scale(.98)}
    button.primary{
      background:var(--dorado);
      color:#4b2500;
    }
    button.dark{
      background:#222;
      color:white;
    }
    button.dest{
      background:white;
      color:var(--rojo);
      min-height:68px;
    }
    .status{
      margin-top:12px;
      text-align:center;
      min-height:28px;
      font-weight:700;
      background:rgba(255,255,255,.14);
      border-radius:14px;
      padding:10px;
    }
    .small{
      font-size:13px;
      line-height:1.35;
      opacity:.9;
      margin-top:10px;
      text-align:center;
    }
    @media (min-width:700px){
      .layout{
        display:grid;
        grid-template-columns:1.1fr .9fr;
        gap:18px;
        align-items:center;
      }
      .destinations{grid-template-columns:1fr}
      .camera-wrap{max-height:72vh}
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>Cabina de fotos</h1>
      <p>Elige un destino después de tomar la foto</p>
    </header>

    <section class="layout">
      <div>
        <div class="camera-wrap">
          <video id="video" autoplay playsinline muted></video>
          <canvas id="canvas"></canvas>
          <img id="preview" class="preview" alt="Foto tomada" style="display:none;" />
          <div class="badge" id="badge">Cámara activa</div>
        </div>

        <div class="controls">
          <button class="primary" id="btnCapture">📸 Tomar foto</button>
          <button class="dark" id="btnRetake">🔁 Repetir</button>
        </div>
      </div>

      <div>
        <div class="destinations" id="destinations">
          <button class="dest" data-dest="Machupichu">Subir como Machupichu</button>
          <button class="dest" data-dest="Colca">Subir como Colca</button>
          <button class="dest" data-dest="Puno">Subir como Puno</button>
        </div>

        <div class="status" id="status">
          Presiona “Tomar foto” para comenzar.
        </div>

        <div class="small">
          Las fotos se subirán a Dropbox dentro de:<br>
          <strong>/Perú/Machupichu</strong>, <strong>/Perú/Colca</strong> y <strong>/Perú/Puno</strong>.
        </div>
      </div>
    </section>
  </main>

<script>

const CONFIG = {
  carpetaPrincipal: "/Perú",
  destinos: {
    "Machupichu": "machupichu",
    "Colca": "colca",
    "Puno": "puno"
  }
};

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const preview = document.getElementById("preview");
const btnCapture = document.getElementById("btnCapture");
const btnRetake = document.getElementById("btnRetake");
const destinations = document.getElementById("destinations");
const statusBox = document.getElementById("status");
const badge = document.getElementById("badge");

let currentBlob = null;
let stream = null;

function setStatus(text){
  statusBox.textContent = text;
}

async function iniciarCamara(){
  try{
    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: "user",
        width: { ideal: 1280 },
        height: { ideal: 1920 }
      },
      audio:false
    });
    video.srcObject = stream;
    video.style.display = "block";
    preview.style.display = "none";
    badge.textContent = "Cámara activa";
    setStatus("Cámara lista. Presiona “Tomar foto”.");
  }catch(error){
    console.error(error);
    setStatus("No se pudo abrir la cámara. Usa HTTPS o GitHub Pages y acepta el permiso.");
    badge.textContent = "Sin cámara";
  }
}

function obtenerNumeroSecuencial(destino){
  const key = "contador_" + destino.toLowerCase();
  const actual = parseInt(localStorage.getItem(key) || "0", 10) + 1;
  localStorage.setItem(key, String(actual));
  return String(actual).padStart(3, "0");
}

function crearNombreArchivo(destino){
  const prefijo = CONFIG.destinos[destino];
  const numero = obtenerNumeroSecuencial(destino);
  return `${prefijo}_${numero}.jpg`;
}

function rutaDropbox(destino, nombreArchivo){
  return `${CONFIG.carpetaPrincipal}/${destino}/${nombreArchivo}`;
}

function tomarFoto(){
  const w = video.videoWidth || 1080;
  const h = video.videoHeight || 1440;
  canvas.width = w;
  canvas.height = h;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0, w, h);

  canvas.toBlob((blob)=>{
    currentBlob = blob;
    preview.src = URL.createObjectURL(blob);
    video.style.display = "none";
    preview.style.display = "block";
    destinations.style.display = "grid";
    badge.textContent = "Foto tomada";
    setStatus("Ahora elige el destino para subir la foto.");
  }, "image/jpeg", 0.92);
}

function repetirFoto(){
  currentBlob = null;
  preview.src = "";
  preview.style.display = "none";
  video.style.display = "block";
  destinations.style.display = "none";
  badge.textContent = "Cámara activa";
  setStatus("Foto descartada. Toma una nueva foto.");
}

async function subirADropbox(destino){
  if(!currentBlob){
    setStatus("Primero toma una foto.");
    return;
  }

  if(!DROPBOX_ACCESS_TOKEN || DROPBOX_ACCESS_TOKEN === "PEGA_AQUI_TU_TOKEN_DE_DROPBOX"){
    setStatus("Falta pegar el token de Dropbox en el archivo HTML.");
    return;
  }

  const nombreArchivo = crearNombreArchivo(destino);
  const path = rutaDropbox(destino, nombreArchivo);

  setStatus(`Subiendo ${nombreArchivo} a Dropbox...`);

  try{
    const response = await fetch("https://content.dropboxapi.com/2/files/upload", {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${DROPBOX_ACCESS_TOKEN}`,
        "Dropbox-API-Arg": JSON.stringify({
          path: path,
          mode: "add",
          autorename: true,
          mute: false,
          strict_conflict: false
        }),
        "Content-Type": "application/octet-stream"
      },
      body: currentBlob
    });

    const data = await response.json();

    if(!response.ok){
      console.error(data);
      throw new Error(data?.error_summary || "Error al subir a Dropbox");
    }

    setStatus(`✅ Foto subida: ${nombreArchivo}`);
    destinations.style.display = "none";

    setTimeout(()=>{
      repetirFoto();
      setStatus("Listo. Puedes tomar otra foto.");
    }, 1800);

  }catch(error){
    console.error(error);
    setStatus("❌ Error al subir. Revisa token, permisos o conexión.");
  }
}

btnCapture.addEventListener("click", tomarFoto);
btnRetake.addEventListener("click", repetirFoto);

document.querySelectorAll("[data-dest]").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    subirADropbox(btn.dataset.dest);
  });
});

iniciarCamara();
</script>
</body>
</html>

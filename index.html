<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cabina Fotográfica Gastronómica</title>
  <style>
    :root {
      --rojo: #b20d1e;
      --rojo-oscuro: #7d0714;
      --crema: #fff4dc;
      --dorado: #ffc857;
      --verde: #2f8f46;
      --texto: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(255, 200, 87, 0.25), transparent 35%),
        linear-gradient(180deg, var(--rojo), var(--rojo-oscuro));
      color: var(--texto);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
    }

    .app {
      width: 100%;
      max-width: 480px;
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.25);
      border-radius: 28px;
      padding: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
      backdrop-filter: blur(8px);
      text-align: center;
    }

    .badge {
      display: inline-block;
      background: var(--dorado);
      color: #5c2500;
      padding: 7px 14px;
      border-radius: 999px;
      font-weight: 700;
      margin-bottom: 10px;
      font-size: 14px;
    }

    h1 {
      margin: 8px 0 4px;
      font-size: 28px;
      line-height: 1.1;
    }

    .subtitle {
      margin: 0 0 18px;
      color: var(--crema);
      font-size: 15px;
    }

    .camera-box {
      width: 100%;
      aspect-ratio: 3 / 4;
      background: #250006;
      border-radius: 24px;
      overflow: hidden;
      border: 4px solid rgba(255,255,255,0.28);
      position: relative;
    }

    video, canvas, img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    canvas {
      display: none;
    }

    .preview {
      display: none;
    }

    .decor {
      display: flex;
      justify-content: center;
      gap: 10px;
      font-size: 28px;
      margin: 12px 0;
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:active {
      transform: scale(0.97);
    }

    .primary {
      background: var(--dorado);
      color: #4b1c00;
      margin-top: 16px;
    }

    .secondary {
      background: #ffffff;
      color: var(--rojo-oscuro);
      margin-top: 10px;
    }

    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .food {
      background: var(--verde);
      color: white;
      min-height: 66px;
    }

    .hidden {
      display: none;
    }

    .status {
      margin-top: 14px;
      min-height: 24px;
      color: var(--crema);
      font-weight: 700;
    }

    .small {
      margin-top: 12px;
      font-size: 12px;
      color: #ffeec3;
      line-height: 1.4;
    }

    @media (max-width: 390px) {
      h1 {
        font-size: 24px;
      }

      .options {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="badge">🍽️ Cabina gastronómica</div>
    <h1>Sabores del Perú</h1>
    <p class="subtitle">Toma tu foto y súbela a Dropbox según la opción elegida.</p>

    <section class="camera-box">
      <video id="video" autoplay playsinline></video>
      <img id="preview" class="preview" alt="Vista previa de la foto" />
      <canvas id="canvas"></canvas>
    </section>

    <div class="decor">🥘 🍃 📸 🍛</div>

    <button class="primary" id="openCameraBtn">Abrir cámara</button>
    <button class="secondary" id="captureBtn">Tomar foto</button>
    <button class="secondary hidden" id="retakeBtn">Tomar otra foto</button>

    <div class="options hidden" id="uploadOptions">
      <button class="food" data-key="juane_sentado">Juane sentado</button>
      <button class="food" data-key="juane_de_pie">Juane de pie</button>
      <button class="food" data-key="pachamanca_sentado">Pachamanca sentado</button>
      <button class="food" data-key="pachamanca_de_pie">Pachamanca de pie</button>
    </div>

    <div class="status" id="status"></div>

    <p class="small">
      Nota: para que la cámara funcione en celular, súbelo a GitHub Pages con HTTPS.
    </p>
  </main>

  <script>

    const CONFIG = {
      juane_sentado: {
        label: "Juane sentado",
        prefix: "JUANE_SENTADO",
        folder: "/Cabina Gastronomica/Juane sentado"
      },
      juane_de_pie: {
        label: "Juane de pie",
        prefix: "JUANE_DE_PIE",
        folder: "/Cabina Gastronomica/Juane de pie"
      },
      pachamanca_sentado: {
        label: "Pachamanca sentado",
        prefix: "PACHAMANCA_SENTADO",
        folder: "/Cabina Gastronomica/Pachamanca sentado"
      },
      pachamanca_de_pie: {
        label: "Pachamanca de pie",
        prefix: "PACHAMANCA_DE_PIE",
        folder: "/Cabina Gastronomica/Pachamanca de pie"
      }
    };

    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const preview = document.getElementById("preview");
    const openCameraBtn = document.getElementById("openCameraBtn");
    const captureBtn = document.getElementById("captureBtn");
    const retakeBtn = document.getElementById("retakeBtn");
    const uploadOptions = document.getElementById("uploadOptions");
    const statusBox = document.getElementById("status");

    let stream = null;
    let currentBlob = null;

    function setStatus(message) {
      statusBox.textContent = message;
    }

    async function openCamera() {
      try {
        setStatus("Abriendo cámara...");
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "user",
            width: { ideal: 1080 },
            height: { ideal: 1440 }
          },
          audio: false
        });

        video.srcObject = stream;
        video.style.display = "block";
        preview.style.display = "none";
        uploadOptions.classList.add("hidden");
        retakeBtn.classList.add("hidden");
        currentBlob = null;
        setStatus("Cámara lista.");
      } catch (error) {
        console.error(error);
        setStatus("No se pudo abrir la cámara. Revisa permisos o usa HTTPS.");
      }
    }

    function capturePhoto() {
      if (!stream) {
        setStatus("Primero abre la cámara.");
        return;
      }

      const videoWidth = video.videoWidth;
      const videoHeight = video.videoHeight;

      if (!videoWidth || !videoHeight) {
        setStatus("La cámara aún está cargando.");
        return;
      }

      canvas.width = videoWidth;
      canvas.height = videoHeight;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      canvas.toBlob((blob) => {
        currentBlob = blob;
        const url = URL.createObjectURL(blob);
        preview.src = url;
        preview.style.display = "block";
        video.style.display = "none";
        uploadOptions.classList.remove("hidden");
        retakeBtn.classList.remove("hidden");
        setStatus("Foto lista. Elige una categoría para subirla.");
      }, "image/jpeg", 0.92);
    }

    function getNextFileName(configKey) {
      const item = CONFIG[configKey];
      const storageKey = `contador_${configKey}`;
      const current = Number(localStorage.getItem(storageKey) || "0") + 1;
      localStorage.setItem(storageKey, String(current));

      const number = String(current).padStart(3, "0");
      return `${item.prefix}_${number}.jpg`;
    }

    async function uploadToDropbox(configKey) {
      if (!currentBlob) {
        setStatus("Primero toma una foto.");
        return;
      }

      if (!DROPBOX_ACCESS_TOKEN || DROPBOX_ACCESS_TOKEN === "PEGAR_AQUI_TU_ACCESS_TOKEN") {
        setStatus("Falta pegar tu Access Token de Dropbox en el HTML.");
        return;
      }

      const item = CONFIG[configKey];
      const fileName = getNextFileName(configKey);
      const dropboxPath = `${item.folder}/${fileName}`;

      setStatus(`Subiendo: ${fileName}...`);

      try {
        const response = await fetch("https://content.dropboxapi.com/2/files/upload", {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${DROPBOX_ACCESS_TOKEN}`,
            "Dropbox-API-Arg": JSON.stringify({
              path: dropboxPath,
              mode: "add",
              autorename: true,
              mute: false
            }),
            "Content-Type": "application/octet-stream"
          },
          body: currentBlob
        });

        if (!response.ok) {
          const errorText = await response.text();
          console.error(errorText);
          throw new Error(errorText);
        }

        setStatus(`Foto subida a Dropbox: ${item.label}`);
        uploadOptions.classList.add("hidden");
      } catch (error) {
        console.error(error);
        setStatus("Error al subir a Dropbox. Revisa token, permisos o conexión.");
      }
    }

    openCameraBtn.addEventListener("click", openCamera);
    captureBtn.addEventListener("click", capturePhoto);
    retakeBtn.addEventListener("click", () => {
      preview.style.display = "none";
      video.style.display = "block";
      uploadOptions.classList.add("hidden");
      retakeBtn.classList.add("hidden");
      currentBlob = null;
      setStatus("Puedes tomar otra foto.");
    });

    document.querySelectorAll("[data-key]").forEach((button) => {
      button.addEventListener("click", () => {
        uploadToDropbox(button.dataset.key);
      });
    });
  </script>
</body>
</html>

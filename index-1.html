<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Cabina Turística Virtual</title>

  <!-- MediaPipe Selfie Segmentation -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js"></script>

  <style>
    :root{
      --rojo:#c8102e;
      --rojo2:#8a0018;
      --dorado:#ffd166;
      --blanco:#fff;
      --oscuro:#111;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html, body{
      margin:0;
      width:100%;
      min-height:100%;
      font-family:Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(255,255,255,.2), transparent 30%),
        linear-gradient(155deg, var(--rojo), var(--rojo2));
      color:white;
      overflow-x:hidden;
    }

    body{
      display:flex;
      justify-content:center;
      padding:14px;
    }

    .app{
      width:100%;
      max-width:480px;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    header{
      text-align:center;
      padding:10px 6px 2px;
    }

    h1{
      margin:0;
      font-size:clamp(28px, 8vw, 42px);
      line-height:1;
      font-weight:900;
      text-shadow:0 5px 12px rgba(0,0,0,.35);
    }

    .subtitle{
      margin:9px 0 0;
      font-size:15px;
      opacity:.95;
    }

    .band{
      height:17px;
      border-radius:30px;
      border:2px solid rgba(255,255,255,.45);
      background:repeating-linear-gradient(
        45deg,
        var(--dorado) 0 8px,
        transparent 8px 16px
      );
      opacity:.95;
    }

    .notice{
      padding:12px;
      border-radius:18px;
      text-align:center;
      font-size:13px;
      line-height:1.35;
      background:rgba(255,255,255,.15);
      border:2px solid rgba(255,255,255,.35);
      box-shadow:0 8px 18px rgba(0,0,0,.18);
    }

    .notice.ok{
      background:rgba(0,180,90,.22);
      border-color:rgba(180,255,210,.7);
    }

    .notice.error{
      background:rgba(0,0,0,.34);
      border-color:rgba(255,210,210,.75);
    }

    .screen{
      position:relative;
      width:100%;
      aspect-ratio:9/14;
      min-height:500px;
      border:5px solid white;
      border-radius:30px;
      overflow:hidden;
      background:#111;
      box-shadow:0 18px 42px rgba(0,0,0,.38);
    }

    video{
      display:none;
    }

    canvas{
      display:block;
      width:100%;
      height:100%;
      background:#111;
    }

    .placeholder{
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:28px;
      background:
        linear-gradient(rgba(0,0,0,.18), rgba(0,0,0,.6)),
        url("https://images.unsplash.com/photo-1526392060635-9d6019884377?auto=format&fit=crop&w=1200&q=90") center/cover;
      z-index:3;
    }

    .placeholder .icon{
      font-size:66px;
      margin-bottom:10px;
    }

    .placeholder strong{
      font-size:24px;
      text-shadow:0 3px 10px #000;
    }

    .placeholder span{
      margin-top:8px;
      font-size:15px;
      line-height:1.35;
      text-shadow:0 2px 8px #000;
    }

    .controls{
      display:grid;
      gap:10px;
      padding-bottom:12px;
    }

    button{
      border:none;
      border-radius:18px;
      padding:14px 10px;
      cursor:pointer;
      font-weight:900;
      font-size:15px;
      box-shadow:0 8px 20px rgba(0,0,0,.24);
      transition:transform .12s ease, opacity .12s ease;
    }

    button:active{
      transform:scale(.96);
    }

    button:disabled{
      opacity:.45;
    }

    .primary{
      width:100%;
      padding:18px;
      font-size:20px;
      color:#7c0015;
      background:linear-gradient(180deg, #fff, #ffe2e8);
    }

    .landscapes{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
    }

    .landscape{
      color:white;
      background:rgba(255,255,255,.18);
      backdrop-filter:blur(7px);
    }

    .landscape.active{
      color:#6c0012;
      background:var(--dorado);
    }

    .grid2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .secondary{
      color:#850018;
      background:white;
    }

    .dark{
      color:white;
      background:rgba(0,0,0,.34);
    }

    .status{
      min-height:24px;
      text-align:center;
      font-size:14px;
      color:#fff2bd;
      line-height:1.35;
      text-shadow:0 2px 8px rgba(0,0,0,.35);
    }

    .preview{
      display:none;
      width:100%;
      border:4px solid white;
      border-radius:20px;
      box-shadow:0 12px 28px rgba(0,0,0,.3);
    }

    .note{
      text-align:center;
      font-size:12px;
      opacity:.85;
      line-height:1.35;
    }

    @media(max-width:380px){
      body{ padding:10px; }
      .screen{ min-height:440px; border-radius:24px; }
      .primary{ font-size:18px; padding:16px; }
      button{ font-size:13px; }
    }
  </style>
</head>

<body>
  <main class="app">
    <header>
      <h1>Cabina turística virtual</h1>
      <p class="subtitle">Elige un paisaje y mírate en vivo desde tu celular</p>
    </header>

    <div class="band"></div>

    <div class="notice" id="httpsNotice">
      Verificando acceso seguro HTTPS...
    </div>

    <section class="screen" id="screen">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>

      <div class="placeholder" id="placeholder">
        <div class="icon">📸</div>
        <strong>Abre la cámara</strong>
        <span>Presiona el botón y acepta el permiso de cámara del celular.</span>
      </div>
    </section>

    <section class="controls">
      <button class="primary" id="openCamera">📷 Abrir cámara</button>

      <div class="landscapes">
        <button class="landscape active" data-place="machupichu">Machupichu</button>
        <button class="landscape" data-place="colca">Colca</button>
        <button class="landscape" data-place="amazonas">Amazonas</button>
      </div>

      <div class="grid2">
        <button class="secondary" id="capture">✨ Tomar foto</button>
        <button class="secondary" id="download" disabled>⬇ Descargar</button>
      </div>

      <div class="grid2">
        <button class="dark" id="switchCamera">🔄 Cambiar cámara</button>
        <button class="dark" id="fullscreen">⛶ Pantalla completa</button>
      </div>

      <img class="preview" id="preview" alt="Foto tomada" />

      <div class="status" id="status"></div>

      <div class="note">
        Publicar como <b>index.html</b> en tu repositorio:
        <br>https://aordonezavi-sudo.github.io/camera-app/
      </div>
    </section>
  </main>

  <script>
    const PAGE_URL = "https://aordonezavi-sudo.github.io/camera-app/";

    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d", { willReadFrequently:true });

    const screenBox = document.getElementById("screen");
    const placeholder = document.getElementById("placeholder");
    const httpsNotice = document.getElementById("httpsNotice");
    const statusEl = document.getElementById("status");
    const preview = document.getElementById("preview");

    const openCameraBtn = document.getElementById("openCamera");
    const captureBtn = document.getElementById("capture");
    const downloadBtn = document.getElementById("download");
    const switchCameraBtn = document.getElementById("switchCamera");
    const fullscreenBtn = document.getElementById("fullscreen");
    const landscapeBtns = document.querySelectorAll(".landscape");

    let stream = null;
    let segmenter = null;
    let selectedPlace = "machupichu";
    let facingMode = "user";
    let isCameraOn = false;
    let lastResult = null;
    let capturedImage = "";
    let photoNumber = Number(localStorage.getItem("cabina_photo_number") || "1");

    const backgrounds = {
      machupichu: "https://images.unsplash.com/photo-1526392060635-9d6019884377?auto=format&fit=crop&w=1400&q=90",
      colca: "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1400&q=90",
      amazonas: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=1400&q=90"
    };

    const bgImages = {};

    function setStatus(text){
      statusEl.textContent = text || "";
    }

    function isSecure(){
      return location.protocol === "https:" || location.hostname === "localhost" || location.hostname === "127.0.0.1";
    }

    function checkHttps(){
      if(isSecure()){
        httpsNotice.className = "notice ok";
        httpsNotice.textContent = "HTTPS activo. La cámara puede solicitar permisos.";
        return true;
      }else{
        httpsNotice.className = "notice error";
        httpsNotice.textContent = "Para usar la cámara, abre esta página desde HTTPS.";
        return false;
      }
    }

    function loadBackgrounds(){
      Object.entries(backgrounds).forEach(([key, src]) => {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.src = src;
        bgImages[key] = img;
      });
    }

    function resizeCanvas(){
      const rect = screenBox.getBoundingClientRect();
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.round(rect.width * dpr);
      canvas.height = Math.round(rect.height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function drawCover(img, x, y, w, h){
      if(!img || !img.complete || !img.naturalWidth){
        ctx.fillStyle = "#161616";
        ctx.fillRect(x, y, w, h);
        return;
      }

      const imgRatio = img.naturalWidth / img.naturalHeight;
      const boxRatio = w / h;

      let drawW, drawH, dx, dy;

      if(imgRatio > boxRatio){
        drawH = h;
        drawW = h * imgRatio;
        dx = x - (drawW - w) / 2;
        dy = y;
      }else{
        drawW = w;
        drawH = w / imgRatio;
        dx = x;
        dy = y - (drawH - h) / 2;
      }

      ctx.drawImage(img, dx, dy, drawW, drawH);
    }

    function drawTextOverlay(w, h){
      ctx.save();
      ctx.fillStyle = "rgba(0,0,0,.35)";
      ctx.fillRect(0, h - 58, w, 58);

      ctx.fillStyle = "white";
      ctx.font = "bold 20px Arial";
      ctx.textAlign = "center";

      const label = selectedPlace === "machupichu"
        ? "Machupichu"
        : selectedPlace === "colca"
          ? "Colca"
          : "Amazonas";

      ctx.fillText(label, w / 2, h - 22);
      ctx.restore();
    }

    function onSegmentationResults(results){
      lastResult = results;

      const rect = screenBox.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height;

      ctx.clearRect(0, 0, w, h);
      drawCover(bgImages[selectedPlace], 0, 0, w, h);

      if(!results || !results.segmentationMask || !results.image){
        drawTextOverlay(w, h);
        return;
      }

      const temp = document.createElement("canvas");
      temp.width = canvas.width;
      temp.height = canvas.height;
      const tctx = temp.getContext("2d");

      tctx.drawImage(results.segmentationMask, 0, 0, temp.width, temp.height);
      tctx.globalCompositeOperation = "source-in";

      tctx.save();

      if(facingMode === "user"){
        tctx.translate(temp.width, 0);
        tctx.scale(-1, 1);
      }

      tctx.drawImage(results.image, 0, 0, temp.width, temp.height);
      tctx.restore();

      ctx.save();
      ctx.globalAlpha = .26;
      ctx.filter = "blur(16px)";
      ctx.drawImage(temp, 8, 16, w, h);
      ctx.restore();

      ctx.drawImage(temp, 0, 0, w, h);

      const grad = ctx.createLinearGradient(0, 0, 0, h);
      grad.addColorStop(0, "rgba(255,255,255,.12)");
      grad.addColorStop(.55, "rgba(255,255,255,0)");
      grad.addColorStop(1, "rgba(0,0,0,.14)");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);

      drawTextOverlay(w, h);
    }

    async function initSegmenter(){
      if(segmenter) return segmenter;

      segmenter = new SelfieSegmentation({
        locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`
      });

      segmenter.setOptions({
        modelSelection: 1,
        selfieMode: facingMode === "user"
      });

      segmenter.onResults(onSegmentationResults);
      return segmenter;
    }

    async function stopCamera(){
      if(stream){
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
      isCameraOn = false;
    }

    async function openCamera(){
      setStatus("");

      if(!checkHttps()){
        setStatus("Abre tu enlace HTTPS de GitHub Pages: " + PAGE_URL);
        return;
      }

      if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
        setStatus("Este navegador no permite abrir cámara con getUserMedia.");
        return;
      }

      try{
        setStatus("Solicitando permiso de cámara...");
        placeholder.style.display = "none";
        resizeCanvas();

        await stopCamera();
        await initSegmenter();

        if(segmenter){
          segmenter.setOptions({
            modelSelection: 1,
            selfieMode: facingMode === "user"
          });
        }

        stream = await navigator.mediaDevices.getUserMedia({
          video:{
            facingMode: facingMode,
            width:{ ideal:1280 },
            height:{ ideal:720 }
          },
          audio:false
        });

        video.srcObject = stream;
        await video.play();

        isCameraOn = true;
        setStatus("Cámara activa. Ya puedes cambiar de paisaje o tomar foto.");
        processFrame();
      }catch(error){
        console.error(error);
        placeholder.style.display = "flex";

        if(error.name === "NotAllowedError" || error.name === "PermissionDeniedError"){
          setStatus("Permiso denegado. En Chrome toca el candado 🔒 > Permisos > Cámara > Permitir.");
        }else if(error.name === "NotFoundError"){
          setStatus("No se encontró cámara en este celular.");
        }else if(error.name === "NotReadableError"){
          setStatus("La cámara está siendo usada por otra app. Ciérrala e intenta otra vez.");
        }else{
          setStatus("No se pudo abrir la cámara. Revisa HTTPS, permisos y navegador.");
        }
      }
    }

    async function processFrame(){
      if(!isCameraOn || !segmenter) return;

      if(video.readyState >= 2){
        try{
          await segmenter.send({ image: video });
        }catch(e){
          console.warn(e);
        }
      }

      requestAnimationFrame(processFrame);
    }

    function capturePhoto(){
      if(!isCameraOn || !lastResult){
        setStatus("Primero presiona Abrir cámara.");
        return;
      }

      capturedImage = canvas.toDataURL("image/png", 1);
      preview.src = capturedImage;
      preview.style.display = "block";
      downloadBtn.disabled = false;
      setStatus("Foto tomada. Presiona Descargar.");
    }

    function downloadPhoto(){
      if(!capturedImage) return;

      const link = document.createElement("a");
      link.href = capturedImage;
      link.download = `cabina_turistica_${String(photoNumber).padStart(3, "0")}.png`;
      document.body.appendChild(link);
      link.click();
      link.remove();

      photoNumber++;
      localStorage.setItem("cabina_photo_number", String(photoNumber));
      setStatus("Foto descargada.");
    }

    async function switchCamera(){
      facingMode = facingMode === "user" ? "environment" : "user";
      setStatus(facingMode === "user" ? "Cambiando a cámara frontal..." : "Cambiando a cámara trasera...");
      await openCamera();
    }

    async function fullscreen(){
      try{
        if(!document.fullscreenElement){
          await document.documentElement.requestFullscreen();
        }else{
          await document.exitFullscreen();
        }
      }catch(e){
        setStatus("Pantalla completa no disponible.");
      }
    }

    landscapeBtns.forEach(btn => {
      btn.addEventListener("click", () => {
        landscapeBtns.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        selectedPlace = btn.dataset.place;
        setStatus("Paisaje seleccionado: " + btn.textContent);
      });
    });

    openCameraBtn.addEventListener("click", openCamera);
    captureBtn.addEventListener("click", capturePhoto);
    downloadBtn.addEventListener("click", downloadPhoto);
    switchCameraBtn.addEventListener("click", switchCamera);
    fullscreenBtn.addEventListener("click", fullscreen);

    window.addEventListener("resize", resizeCanvas);

    loadBackgrounds();
    resizeCanvas();
    checkHttps();
  </script>
</body>
</html>

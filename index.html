
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cabina Gastronómica</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#b3001b,#6f0010);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:white;
padding:20px;
}
.container{
width:100%;
max-width:500px;
background:rgba(255,255,255,.1);
padding:20px;
border-radius:25px;
text-align:center;
backdrop-filter:blur(8px);
}
video,img{
width:100%;
border-radius:20px;
background:black;
}
button{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:15px;
font-weight:bold;
font-size:16px;
cursor:pointer;
}
.primary{background:#ffc857;color:#5a2000;}
.food{background:#2f8f46;color:white;}
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}
</style>
</head>
<body>
<div class="container">
<h1>🍽️ Cabina Gastronómica</h1>

<video id="video" autoplay playsinline></video>
<img id="preview" style="display:none;">

<button class="primary" onclick="abrirCamara()">Abrir cámara</button>
<button class="primary" onclick="tomarFoto()">Tomar foto</button>

<div class="grid" id="opciones" style="display:none;">
<button class="food" onclick="subir('JUANE_SENTADO','/Cabina Gastronomica/Juane sentado')">Juane sentado</button>
<button class="food" onclick="subir('JUANE_DE_PIE','/Cabina Gastronomica/Juane de pie')">Juane de pie</button>
<button class="food" onclick="subir('PACHAMANCA_SENTADO','/Cabina Gastronomica/Pachamanca sentado')">Pachamanca sentado</button>
<button class="food" onclick="subir('PACHAMANCA_DE_PIE','/Cabina Gastronomica/Pachamanca de pie')">Pachamanca de pie</button>
</div>

<p id="estado"></p>
<canvas id="canvas" style="display:none;"></canvas>
</div>

const video = document.getElementById("video");
const preview = document.getElementById("preview");
const canvas = document.getElementById("canvas");
const estado = document.getElementById("estado");
const opciones = document.getElementById("opciones");

let fotoBlob = null;

async function abrirCamara(){
try{
const stream = await navigator.mediaDevices.getUserMedia({
video:{facingMode:"user"},
audio:false
});
video.srcObject = stream;
estado.innerText = "Cámara lista";
}catch(e){
estado.innerText = "Error abriendo cámara";
}
}

function tomarFoto(){
const ctx = canvas.getContext("2d");
canvas.width = video.videoWidth;
canvas.height = video.videoHeight;
ctx.drawImage(video,0,0);

canvas.toBlob((blob)=>{
fotoBlob = blob;
preview.src = URL.createObjectURL(blob);
preview.style.display = "block";
video.style.display = "none";
opciones.style.display = "grid";
estado.innerText = "Selecciona una categoría";
},"image/jpeg",0.95);
}

function nombre(prefix){
const key = "contador_"+prefix;
let n = Number(localStorage.getItem(key)||0)+1;
localStorage.setItem(key,n);
return prefix+"_"+String(n).padStart(3,"0")+".jpg";
}

async function subir(prefix,folder){
if(!fotoBlob){
estado.innerText = "Primero toma una foto";
return;
}

const fileName = nombre(prefix);

try{
const res = await fetch("https://content.dropboxapi.com/2/files/upload",{
method:"POST",
headers:{
"Authorization":"Bearer "+TOKEN,
"Dropbox-API-Arg":JSON.stringify({
path:folder+"/"+fileName,
mode:"add",
autorename:true
}),
"Content-Type":"application/octet-stream"
},
body:fotoBlob
});

if(!res.ok){
throw new Error(await res.text());
}

estado.innerText = "Foto subida: "+fileName;

}catch(err){
console.error(err);
estado.innerText = "Error subiendo a Dropbox";
}
}
</script>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cabina Fotográfica Dropbox</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #b40000, #e53935, #8b0000);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
    }

    .app {
      width: 100%;
      max-width: 460px;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 26px;
      padding: 20px;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      text-align: center;
    }

    h1 {
      font-size: 30px;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 15px;
      opacity: 0.9;
      margin-bottom: 18px;
    }

    .camera-box {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 4;
      background: #111;
      border-radius: 22px;
      overflow: hidden;
      border: 4px solid rgba(255, 255, 255, 0.85);
      margin-bottom: 16px;
    }

    video, canvas, #preview {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    canvas {
      display: none;
    }

    #preview {
      display: none;
    }

    .controls, .destinos {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 15px 16px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      color: #8b0000;
      background: white;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.25);
    }

    button:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: #fff200;
      color: #7a0000;
    }

    .btn-upload {
      background: #ffffff;
      color: #b40000;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.45);
    }

    .destinos {
      display: none;
    }

    .status {
      min-height: 28px;
      margin-top: 14px;
      font-size: 15px;
      font-weight: bold;
    }

    .small {
      margin-top: 10px;
      font-size: 12px;
      opacity: 0.8;
      line-height: 1.35;
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>Cabina de Fotos</h1>
    <p class="subtitle">Toma una foto y súbela automáticamente a Dropbox</p>

    <div class="camera-box">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
      <img id="preview" alt="Foto tomada" />
    </div>

    <div class="controls">
      <button class="btn-primary" id="startBtn">📷 Abrir cámara</button>
      <button class="btn-primary" id="captureBtn" disabled>Tomar foto</button>
      <button class="btn-secondary" id="retakeBtn" style="display:none;">Tomar otra foto</button>
    </div>

    <div class="destinos" id="destinos">
      <button class="btn-upload" onclick="subirFoto('machupichu')">Subir a Machupichu</button>
      <button class="btn-upload" onclick="subirFoto('colca')">Subir a Colca</button>
      <button class="btn-upload" onclick="subirFoto('puno')">Subir a Puno</button>
    </div>

    <div class="status" id="status"></div>
    <p class="small">Carpeta principal Dropbox: Cusco</p>
  </main>

  <script>
    const DROPBOX_TOKEN = "sl.u.AGcR970EyBtmtJBbMwLXBBQbU23ZopV6PfhjRWS6vtOKYq7YTzbbS6iPi8Yn0kOKCiRdSGOx_Jd5PZpcDQhuI_d_TPSls_PVYB9RMbJ9jVF8ism9Vs6Oe3417Ewlh14gkw0kWgTcRQFPXzUZT46UPl-KyuL50i_XgyIf3BqnX6fDZpXOO19JuhSBz5Z6Jd9DLZGgNrYZJdFNpaslIqqvpJI6E7cnBhD881xkCwp6FCIO5clkYFN2A_0l4FZ6A5I2NHtEhn_VeXeferBwYrPdlRQtOmS3N1xjKk_D4xviU-y58EErX1s7LZGWwGtCvDTkyqBEmgWBsI62L9TDjbn-SdBq3KZ9vtW0QiNaosgKHeP_SYeOb5nvFLCSADGxjTCDlhOfnlb6vLxB44QyauopqoSacTORiH8swqfSat94xGh5eM1ImsQwqWJqlOoKKbdxDrvj41modbOZ3EPn5LNnZXM51M86HEw87l-GS5uZdjTzff6bXIg7_2FBkIuXITZl0bTZ5OsL7aXiY_AcajicIyv0rC56mgNndSxd7_S7ssDgMQpnsVN1GY2076OA5Tm7rQcRFBqXdhzH9VCSvXFfLBTeufaEVO8qxkqytISU9l0U3QZkK6huZql03H5WOqpL5m4q9AdpV5CAxpeQdGFWxSLOjT7ZZeOIiyk7iM9KO_irHCQvVXy40jfZWzhGx7nuMUa1y0nxd20Rc_HJ38qdMI60_k9Jt2qXLvQOSZG-vbaxLCeVufoumK5SUTPzo39HfDLHInWcZ8BqJjwvZBEbZCWlchVE3-5j6NEX7SDBeA4M4xdTTwgQqYFfvsN-5XZw7vCCtgcSKcMIg3xKNrV55HzmDyMWzO36pu0l8YXdAvbNp47jxCUthmVWKnVwuMEOse_wqaL1buBexGlUbLxkbnYmv3E98sQyE2JhnVecn1gJ3Ympjway2_-4bAf6xWctmCJpshWh-zEJyxubAnmg9vwYT6xONIt48V9c2dTblglikrFS50aRMAOYYONACU4aEd__9YysPXkv8k0_DzNnqPylA08A_CUGGCu5k_r8PWvEqXw1PxMBACVVmrVO74nJi70XwPwgPJPe8BxeSUXNa_cub5PwSDjZ5vvLSYvYBL1UdmY6LEU0ORuybodNEayHkmrC8HI6h1-5AuTne4kiywVbPHN8FtN_e-0Ox_dHH43uiKxqfkTzrzs3lRPF0ID077JFCHemj4eghzfG4icqwi4hjiOJ28McT-zX893ncTs_CzmoCscvdgrnuYwRywzcDPdwikonhKK3a8durUtS96xXApE-i0xNTCCC3RnCJ0taQdCpisicl-uW9SAp23InobG1KZs9Ci8hjXxffT_K06SsBzLOJ2S6hWATA4I_21J729NBZ7MOAbocVQSkeX3g2iP0LGtPSiDXckzSUsIkqoDVTANkAcnDbrwpYIil8cKfRHS1JOCy-OSOOl45Fa0VcRM";

    const CARPETA_PRINCIPAL = "Cusco";

    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const preview = document.getElementById("preview");
    const statusBox = document.getElementById("status");
    const startBtn = document.getElementById("startBtn");
    const captureBtn = document.getElementById("captureBtn");
    const retakeBtn = document.getElementById("retakeBtn");
    const destinos = document.getElementById("destinos");

    let stream = null;
    let fotoBlob = null;

    function setStatus(text) {
      statusBox.textContent = text;
    }

    function numeroSecuencial(destino) {
      const key = `contador_${destino}`;
      const actual = parseInt(localStorage.getItem(key) || "0", 10) + 1;
      localStorage.setItem(key, actual);
      return String(actual).padStart(3, "0");
    }

    async function abrirCamara() {
      try {
        setStatus("Abriendo cámara...");
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "environment",
            width: { ideal: 1280 },
            height: { ideal: 1920 }
          },
          audio: false
        });

        video.srcObject = stream;
        video.style.display = "block";
        preview.style.display = "none";
        captureBtn.disabled = false;
        startBtn.style.display = "none";
        retakeBtn.style.display = "none";
        destinos.style.display = "none";
        setStatus("Cámara lista");
      } catch (error) {
        setStatus("No se pudo abrir la cámara. Usa HTTPS y acepta permisos.");
        console.error(error);
      }
    }

    function tomarFoto() {
      const width = video.videoWidth;
      const height = video.videoHeight;

      if (!width || !height) {
        setStatus("La cámara aún no está lista.");
        return;
      }

      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0, width, height);

      canvas.toBlob((blob) => {
        fotoBlob = blob;
        const url = URL.createObjectURL(blob);
        preview.src = url;
        preview.style.display = "block";
        video.style.display = "none";
        destinos.style.display = "grid";
        retakeBtn.style.display = "block";
        captureBtn.disabled = true;
        setStatus("Foto lista. Elige dónde subirla.");
      }, "image/jpeg", 0.92);
    }

    async function subirFoto(destino) {
      if (!fotoBlob) {
        setStatus("Primero toma una foto.");
        return;
      }

      const numero = numeroSecuencial(destino);
      const nombreArchivo = `${destino}_${numero}.jpg`;
      const carpetaDestino = destino.charAt(0).toUpperCase() + destino.slice(1);
      const rutaDropbox = `/${CARPETA_PRINCIPAL}/${carpetaDestino}/${nombreArchivo}`;

      try {
        setStatus(`Subiendo ${nombreArchivo}...`);

        const respuesta = await fetch("https://content.dropboxapi.com/2/files/upload", {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${DROPBOX_TOKEN}`,
            "Dropbox-API-Arg": JSON.stringify({
              path: rutaDropbox,
              mode: "add",
              autorename: true,
              mute: false,
              strict_conflict: false
            }),
            "Content-Type": "application/octet-stream"
          },
          body: fotoBlob
        });

        if (!respuesta.ok) {
          const errorText = await respuesta.text();
          throw new Error(errorText);
        }

        setStatus(`✅ Subido correctamente: ${nombreArchivo}`);
        destinos.style.display = "none";
      } catch (error) {
        console.error(error);
        setStatus("❌ Error al subir. Revisa token, permisos o conexión.");
      }
    }

    function tomarOtraFoto() {
      fotoBlob = null;
      preview.src = "";
      preview.style.display = "none";
      video.style.display = "block";
      destinos.style.display = "none";
      captureBtn.disabled = false;
      retakeBtn.style.display = "none";
      setStatus("Puedes tomar otra foto.");
    }

    startBtn.addEventListener("click", abrirCamara);
    captureBtn.addEventListener("click", tomarFoto);
    retakeBtn.addEventListener("click", tomarOtraFoto);
  </script>
</body>
</html>
